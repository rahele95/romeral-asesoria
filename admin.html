<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Asesores · El Romeral</title>
<meta name="theme-color" content="#1A2F23">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Lato:wght@300;400;700&display=swap');

:root{
  --gold:#B8935A; --gold-light:#D4AF7A; --gold-glow:rgba(184,147,90,.15);
  --forest:#1A2F23; --forest-deep:#0D1A12; --forest-mid:#2D4A38;
  --ivory:#F7F3EE; --ivory-dark:#EDE8E0;
  --text-dark:#1A1A1A; --text-mid:#5A5A5A; --text-soft:#8A8A8A;
  --green:#3E7C4F; --blue:#4A6B86; --rojo:#C0503C;
  --font-display:'Cormorant Garamond',serif; --font-body:'Lato',sans-serif;
  --sidebar:240px;
  --shadow-sm:0 1px 3px rgba(13,26,18,.06),0 1px 2px rgba(13,26,18,.04);
  --shadow-md:0 4px 16px rgba(13,26,18,.08);
  --shadow-lg:0 12px 40px rgba(13,26,18,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-body);background:var(--ivory);color:var(--text-dark);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
::selection{background:var(--gold-glow)}
a{color:inherit}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes drawerIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ════════ LOGIN ════════ */
#login{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(rgba(13,26,18,.82),rgba(13,26,18,.88)),url('fotos/lago_noche_01.jpg') center/cover no-repeat;
}
.login-card{
  width:360px;max-width:90vw;background:#fff;border-radius:18px;padding:48px 44px;
  box-shadow:0 30px 80px rgba(0,0,0,.45);animation:rise .6s ease;text-align:center;
}
.login-card .lc-logo{font:300 28px/1 var(--font-display);color:var(--forest);letter-spacing:.5px}
.login-card .lc-sub{font:400 10px/1 var(--font-body);letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-top:12px}
.login-card .lc-rule{width:32px;height:1px;background:var(--ivory-dark);margin:28px auto}
.login-pin{
  border:0;border-bottom:1.5px solid var(--ivory-dark);width:100%;text-align:center;
  font:300 24px/1.2 var(--font-display);color:var(--forest);letter-spacing:6px;padding:8px 0;
  background:transparent;transition:border-color .3s;
}
.login-pin::placeholder{letter-spacing:2px;color:rgba(26,47,35,.2)}
.login-pin:focus{outline:none;border-bottom-color:var(--gold)}
.login-pin.shake{animation:shake .4s ease;border-bottom-color:var(--rojo)}
.login-err{font:400 12px/1 var(--font-body);color:rgba(192,80,60,.85);height:14px;margin-top:14px;opacity:0;transition:opacity .25s}
.login-err.show{opacity:1}
.login-btn{
  width:100%;margin-top:26px;padding:15px;background:var(--forest);color:#fff;border:none;border-radius:3px;
  font:400 11px/1 var(--font-body);letter-spacing:3px;text-transform:uppercase;transition:all .3s;
}
.login-btn:hover{background:var(--forest-mid);transform:translateY(-1px)}

/* ════════ APP SHELL ════════ */
#app{display:none}
#app.on{display:block;animation:fadeIn .4s ease}

.sidebar{
  position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;background:var(--forest);
  display:flex;flex-direction:column;z-index:50;
}
.sb-brand{padding:28px 24px 22px}
.sb-brand .bn{font:400 9px/1 var(--font-body);letter-spacing:6px;color:rgba(184,147,90,.6)}
.sb-brand .bt{font:300 24px/1 var(--font-display);color:#fff;margin-top:10px;letter-spacing:.5px}
.sb-brand .bs{font:400 10px/1 var(--font-body);color:rgba(255,255,255,.4);margin-top:8px;letter-spacing:1px}
.sb-rule{height:1px;background:rgba(255,255,255,.07);margin:6px 24px 14px}
.sb-nav{flex:1;padding:0 12px}
.nav-item{
  display:flex;align-items:center;gap:13px;padding:12px 14px;border-radius:7px;
  font:400 13px/1 var(--font-body);color:rgba(255,255,255,.62);
  border-left:3px solid transparent;margin:2px 0;transition:all .22s;user-select:none;
}
.nav-item svg{width:17px;height:17px;flex:none;stroke:currentColor;fill:none;stroke-width:1.6}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.9)}
.nav-item.active{background:var(--gold-glow);border-left-color:var(--gold);color:var(--gold-light)}
.sb-foot{padding:18px 26px 24px}
.sb-logout{
  display:flex;align-items:center;gap:9px;font:400 11px/1 var(--font-body);
  color:rgba(255,255,255,.32);transition:color .25s;letter-spacing:.5px;
}
.sb-logout svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.6}
.sb-logout:hover{color:var(--gold-light)}

.topbar{
  position:sticky;top:0;height:64px;margin-left:var(--sidebar);background:#fff;
  border-bottom:1px solid var(--ivory-dark);display:flex;align-items:center;
  padding:0 32px;gap:20px;z-index:40;
}
.tb-title{font:400 22px/1 var(--font-display);color:var(--forest);flex:none;letter-spacing:.3px}
.tb-spacer{flex:1}
.tb-search{
  position:relative;width:300px;max-width:34vw;
}
.tb-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text-soft);fill:none;stroke-width:1.7}
.tb-search input{
  width:100%;border:1px solid var(--ivory-dark);background:var(--ivory);border-radius:30px;
  padding:9px 14px 9px 36px;font:400 13px/1 var(--font-body);color:var(--text-dark);transition:all .25s;
}
.tb-search input:focus{outline:none;border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px var(--gold-glow)}
.tb-bell{position:relative;width:38px;height:38px;border-radius:50%;border:1px solid var(--ivory-dark);background:#fff;display:flex;align-items:center;justify-content:center;transition:all .25s}
.tb-bell svg{width:17px;height:17px;stroke:var(--text-mid);fill:none;stroke-width:1.6}
.tb-bell:hover{border-color:var(--gold)}
.tb-bell .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--gold);border:1.5px solid #fff}
.tb-user{display:flex;align-items:center;gap:10px}
.tb-user .nm{font:400 12px/1 var(--font-body);color:var(--forest);letter-spacing:.3px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--forest);color:var(--gold-light);display:flex;align-items:center;justify-content:center;font:400 13px/1 var(--font-display);letter-spacing:.5px}

.content{margin-left:var(--sidebar);padding:32px;min-height:calc(100vh - 64px)}
.section{display:none}
.section.show{display:block;animation:rise .45s ease}

/* ════════ SHARED BITS ════════ */
.eyebrow{font:400 10px/1 var(--font-body);letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.block-title{font:400 19px/1.2 var(--font-display);color:var(--forest)}
.panel{background:#fff;border:1px solid var(--ivory-dark);border-radius:14px;box-shadow:var(--shadow-sm)}
.row-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px}
.link-gold{font:400 12px/1 var(--font-body);color:var(--gold);letter-spacing:.5px;border-bottom:1px solid transparent;transition:border-color .2s}
.link-gold:hover{border-bottom-color:var(--gold)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kpi{background:#fff;border:1px solid var(--ivory-dark);border-top:3px solid var(--gold);border-radius:12px;padding:22px 22px 20px;box-shadow:var(--shadow-sm);transition:transform .25s,box-shadow .25s}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.kpi .kl{font:400 11px/1 var(--font-body);letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft)}
.kpi .kv{font:300 46px/1 var(--font-display);color:var(--forest);margin:14px 0 8px}
.kpi.accent-gold{border-top-color:var(--gold)} .kpi.accent-gold .kv{color:var(--gold)}
.kpi.accent-green{border-top-color:var(--green)} .kpi.accent-green .kv{color:var(--green)}
.kpi .ktrend{font:400 12px/1 var(--font-body);color:var(--text-mid);display:flex;align-items:center;gap:5px}
.kpi .ktrend .up{color:var(--green)} .kpi .ktrend .dn{color:var(--rojo)}

/* dashboard grid */
.dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:24px;margin-bottom:28px}
@media(max-width:1080px){.dash-grid{grid-template-columns:1fr}}

/* bar chart */
.chart{padding:24px}
.bars{display:flex;align-items:flex-end;gap:14px;height:180px;margin-top:22px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:9px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:46px;background:linear-gradient(180deg,var(--gold-light),var(--gold));border-radius:5px 5px 0 0;transform-origin:bottom;animation:grow .7s cubic-bezier(.2,.8,.2,1);position:relative}
.bar:hover{filter:brightness(1.06)}
.bar .bval{position:absolute;top:-20px;left:0;right:0;text-align:center;font:400 12px/1 var(--font-body);color:var(--forest)}
.bar-lbl{font:400 11px/1 var(--font-body);color:var(--text-soft);letter-spacing:.5px}

/* tables */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse}
table.tbl th{
  text-align:left;font:400 10px/1 var(--font-body);letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-soft);padding:12px 14px;border-bottom:1px solid var(--ivory-dark);white-space:nowrap;
}
table.tbl th.sortable{cursor:pointer;user-select:none;transition:color .2s}
table.tbl th.sortable:hover{color:var(--gold)}
table.tbl th .arr{opacity:.4;font-size:9px}
table.tbl th.sorted .arr{opacity:1;color:var(--gold)}
table.tbl td{padding:14px 14px;border-bottom:1px solid var(--ivory);vertical-align:middle;font:400 13px/1.3 var(--font-body);color:var(--text-mid)}
table.tbl tbody tr{transition:background .18s;cursor:pointer}
table.tbl tbody tr:hover{background:var(--ivory)}
table.tbl tbody tr:last-child td{border-bottom:none}
.td-name{font:500 16px/1.15 var(--font-display);color:var(--forest)}
.td-sub{font:italic 400 12px/1 var(--font-display);color:var(--gold);margin-top:3px}
.cell-mut{font:400 12px/1.3 var(--font-body);color:var(--text-soft)}
.tot{font:500 14px/1 var(--font-body);color:var(--forest);white-space:nowrap}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:30px;font:400 11px/1 var(--font-body);letter-spacing:.3px;white-space:nowrap}
.badge .em{font-size:12px}
.tp-boda{background:#F3E9DD;color:#8a6a3a} .tp-xv{background:#F0E6F2;color:#7a4f86}
.tp-comunion{background:#E6EEF0;color:#456} .tp-social{background:#EAF1E9;color:#3E7C4F}
.tp-corporativo{background:#E9ECEF;color:#445}
.st{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:30px;font:400 11px/1 var(--font-body);letter-spacing:.3px}
.st::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.st-nuevo{background:var(--gold-glow);color:#9a7a44}
.st-contactado{background:rgba(74,107,134,.13);color:var(--blue)}
.st-cita{background:rgba(62,124,79,.13);color:var(--green)}
.st-cerrado{background:rgba(26,47,35,.1);color:var(--forest)}
.people{display:inline-flex;align-items:center;gap:5px;color:var(--text-mid)}
.people svg{width:13px;height:13px;stroke:var(--text-soft);fill:none;stroke-width:1.6}

/* row actions */
.acts{display:flex;gap:6px}
.act{width:30px;height:30px;border-radius:7px;border:1px solid var(--ivory-dark);background:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s}
.act svg{width:15px;height:15px;stroke:var(--text-mid);fill:none;stroke-width:1.6}
.act:hover{border-color:var(--gold);background:var(--gold-glow)}
.act.wa:hover svg{stroke:var(--green)}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kcol{background:var(--ivory);border:1px solid var(--ivory-dark);border-radius:12px;padding:14px;min-height:240px;transition:background .2s,box-shadow .2s}
.kcol.drag-over{background:var(--gold-glow);box-shadow:inset 0 0 0 1.5px var(--gold)}
.kcol-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px}
.kcol-head .kt{font:400 11px/1 var(--font-body);letter-spacing:1.5px;text-transform:uppercase;color:var(--text-mid)}
.kcol-head .kc{font:400 12px/1 var(--font-body);color:#fff;background:var(--forest-mid);min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 7px}
.kcard{background:#fff;border:1px solid var(--ivory-dark);border-left:3px solid var(--gold);border-radius:9px;padding:12px 13px;margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:grab;transition:transform .15s,box-shadow .15s}
.kcard:active{cursor:grabbing}
.kcard.dragging{opacity:.4}
.kcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kcard .kn{font:500 15px/1.1 var(--font-display);color:var(--forest)}
.kcard .kmeta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.kcard .ke{font:400 11px/1 var(--font-body);color:var(--text-soft)}
.kcard .kp{font:500 12px/1 var(--font-body);color:var(--gold)}
.kempty{font:italic 400 13px/1 var(--font-display);color:var(--text-soft);text-align:center;padding:20px 0;opacity:.7}

/* filters */
.filters{margin-bottom:22px}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-row .fl{font:400 10px/1 var(--font-body);letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);width:64px;flex:none}
.pill{padding:7px 15px;border-radius:30px;border:1px solid var(--ivory-dark);background:#fff;font:400 12px/1 var(--font-body);color:var(--text-mid);transition:all .2s}
.pill:hover{border-color:var(--gold)}
.pill.on{background:var(--forest);border-color:var(--forest);color:#fff}
.pill.on.gold{background:var(--gold);border-color:var(--gold)}

/* calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-nav{display:flex;align-items:center;gap:14px}
.cal-nav button{width:34px;height:34px;border-radius:8px;border:1px solid var(--ivory-dark);background:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-nav button:hover{border-color:var(--gold);background:var(--gold-glow)}
.cal-nav button svg{width:15px;height:15px;stroke:var(--text-mid);fill:none;stroke-width:1.8}
.cal-month{font:400 24px/1 var(--font-display);color:var(--forest);min-width:210px;text-align:center;text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-dow{font:400 10px/1 var(--font-body);letter-spacing:1px;text-transform:uppercase;color:var(--text-soft);text-align:center;padding:6px 0}
.cal-cell{background:#fff;border:1px solid var(--ivory-dark);border-radius:9px;min-height:96px;padding:8px;position:relative;transition:box-shadow .2s}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.cal-cell .dnum{font:400 13px/1 var(--font-body);color:var(--text-mid)}
.cal-cell.today .dnum{color:var(--gold);font-weight:700}
.cal-ev{margin-top:5px;padding:3px 6px;border-radius:5px;font:400 10.5px/1.25 var(--font-body);color:#fff;cursor:pointer;display:flex;align-items:center;gap:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:filter .2s}
.cal-ev:hover{filter:brightness(1.08)}
.cal-ev.e-boda{background:#8a6a3a} .cal-ev.e-xv{background:#7a4f86} .cal-ev.e-comunion{background:#5a7884}
.cal-ev.e-social{background:var(--green)} .cal-ev.e-corporativo{background:#556}

/* estadisticas */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:1080px){.stat-grid{grid-template-columns:1fr}}
.hbar-row{display:flex;align-items:center;gap:12px;margin:13px 0}
.hbar-lbl{width:110px;flex:none;font:400 13px/1 var(--font-body);color:var(--text-mid);display:flex;align-items:center;gap:6px}
.hbar-track{flex:1;height:26px;background:var(--ivory);border-radius:13px;overflow:hidden}
.hbar-fill{height:100%;border-radius:13px;display:flex;align-items:center;justify-content:flex-end;padding-right:9px;font:500 11px/1 var(--font-body);color:#fff;animation:grow .6s ease;transform-origin:left;min-width:30px}
.funnel{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.fn-row{display:flex;align-items:center;gap:14px}
.fn-bar{height:42px;border-radius:8px;display:flex;align-items:center;padding:0 16px;color:#fff;font:400 13px/1 var(--font-body);box-shadow:var(--shadow-sm);transition:filter .2s}
.fn-bar .fc{font:300 22px/1 var(--font-display);margin-right:10px}
.fn-pct{font:400 12px/1 var(--font-body);color:var(--text-soft);white-space:nowrap}
.donut-wrap{display:flex;align-items:center;gap:28px;padding:8px 0}
.legend{display:flex;flex-direction:column;gap:10px}
.lg-item{display:flex;align-items:center;gap:9px;font:400 13px/1 var(--font-body);color:var(--text-mid)}
.lg-dot{width:11px;height:11px;border-radius:3px;flex:none}
.lg-v{margin-left:auto;font-weight:700;color:var(--forest)}

/* config */
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:900px){.cfg-grid{grid-template-columns:1fr}}
.cfg-card{padding:26px}
.cfg-card h3{font:400 18px/1 var(--font-display);color:var(--forest);margin-bottom:4px}
.cfg-card p.desc{font:400 12px/1.5 var(--font-body);color:var(--text-soft);margin-bottom:20px}
.field{margin-bottom:18px}
.field label{display:block;font:400 10px/1 var(--font-body);letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.field input{width:100%;border:1px solid var(--ivory-dark);border-radius:7px;padding:11px 13px;font:400 14px/1 var(--font-body);color:var(--forest);transition:all .25s}
.field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.btn{padding:12px 22px;border-radius:7px;border:none;font:400 11px/1 var(--font-body);letter-spacing:2px;text-transform:uppercase;transition:all .25s}
.btn-primary{background:var(--forest);color:#fff}.btn-primary:hover{background:var(--forest-mid)}
.btn-ghost{background:#fff;border:1px solid var(--ivory-dark);color:var(--text-mid)}.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:#fff;border:1px solid rgba(192,80,60,.3);color:var(--rojo)}.btn-danger:hover{background:rgba(192,80,60,.07)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.asesor-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--ivory)}
.asesor-item:last-child{border-bottom:none}
.asesor-item .av{width:34px;height:34px}
.asesor-item .ai{flex:1}
.asesor-item .an{font:500 14px/1 var(--font-display);color:var(--forest)}
.asesor-item .ar{font:400 11px/1 var(--font-body);color:var(--text-soft);margin-top:3px;letter-spacing:.5px}
.cfg-note{font:400 12px/1 var(--font-body);height:16px;margin-top:6px}
.cfg-note.ok{color:var(--green)} .cfg-note.err{color:var(--rojo)}

/* drawer */
.drawer-back{position:fixed;inset:0;background:rgba(13,26,18,.4);z-index:80;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-back.open{opacity:1;pointer-events:all}
.drawer{
  position:fixed;top:0;right:0;width:440px;max-width:92vw;height:100vh;background:#fff;z-index:90;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:var(--shadow-lg);
}
.drawer.open{transform:translateX(0)}
.dr-hero{background:var(--forest);color:#fff;padding:28px 30px 26px;position:relative}
.dr-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.1);border:none;display:flex;align-items:center;justify-content:center;transition:background .2s}
.dr-close:hover{background:rgba(255,255,255,.2)}

/* toast */

<script>
/* ════════════════════ ESTADO Y DATOS ════════════════════ */

// datos demo — se siembran 1 sola vez en localStorage
const SEED=[

  {nombre:'Mariana & Luis',tipo:'boda',personas:160,fecha:'2027-02-14',hora:'noche',musica:'grupo',total:432000,tel:'3338890021',email:'mariluis@gmail.com',estado:'contactado',creado:'2026-06-16T18:30:00',notas:'Boda de San Valentín 2027.'},
  {nombre:'Sofía Mendoza',tipo:'xv',personas:130,fecha:'2026-09-27',hora:'noche',musica:'dj',total:299000,tel:'3311230987',email:'mendoza.sofi@gmail.com',estado:'cita',creado:'2026-06-23T15:20:00',notas:'Muy entusiasmada con la pista junto al lago.'},
  {nombre:'Grupo Amistad',tipo:'social',personas:45,fecha:'2026-08-16',hora:'tarde',musica:'sin',total:90000,tel:'3315562001',email:'reunion.amistad@gmail.com',estado:'nuevo',creado:'2026-06-23T07:05:00',notas:'Reencuentro generación 2005.'}
];

let LEADS=[];
function loadData(){
  try{const r=localStorage.getItem(DATA_KEY);if(r){LEADS=JSON.parse(r);return}}catch(e){}
  seedData();
}
function seedData(){LEADS=SEED.map((l,i)=>({id:'L'+(1000+i),...l}));saveData();}
function saveData(){localStorage.setItem(DATA_KEY,JSON.stringify(LEADS));}
function getPin(){return localStorage.getItem(PIN_KEY)||DEFAULT_PIN;}

/* ════════════════════ HELPERS ════════════════════ */
const $=s=>document.querySelector(s);
const peso=n=>'$'+Number(n||0).toLocaleString('es-MX');
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_L=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DOW=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function fechaCorta(iso){const d=new Date(iso);return d.getDate()+' '+MESES[d.getMonth()].toLowerCase()}
function fechaCreado(iso){
  const d=new Date(iso);let h=d.getHours();const m=String(d.getMinutes()).padStart(2,'0');
  const ap=h>=12?'pm':'am';h=h%12||12;
  return `${d.getDate()} ${MESES[d.getMonth()].toLowerCase()}, ${h}:${m}${ap}`;
}
function haceCuanto(iso){
  const diff=HOY-new Date(iso);const min=Math.floor(diff/60000);
  if(min<1)return'ahora';if(min<60)return`hace ${min} min`;
  const h=Math.floor(min/60);if(h<24)return`hace ${h} h`;
  const d=Math.floor(h/24);if(d===1)return'ayer';if(d<7)return`hace ${d} días`;
  const w=Math.floor(d/7);return w===1?'hace 1 sem':`hace ${w} sem`;
}
function tipoBadge(t){const x=TIPOS[t];return`<span class="badge ${x.cls}"><span class="em">${x.em}</span>${x.label}</span>`}
function estadoBadge(e){const x=ESTADOS[e];return`<span class="st ${x.cls}">${x.label}</span>`}
function waLink(tel){return'https://wa.me/52'+String(tel).replace(/\D/g,'')}
function initials(n){return n.trim().charAt(0).toUpperCase()}

/* ════════════════════ TOAST ════════════════════ */
let toastT;
function toast(msg){
  const t=$('#toast');t.innerHTML='<span class="tcheck">✓</span>'+msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ════════════════════ LOGIN ════════════════════ */
$('#loginForm').addEventListener('submit',e=>{
  e.preventDefault();
  const inp=$('#pinInput'),err=$('#loginErr');
  if(inp.value===getPin()){
    sessionStorage.setItem(SESSION_KEY,'1');
    $('#login').style.display='none';openApp();
  }else{
    inp.classList.add('shake');err.classList.add('show');
    setTimeout(()=>inp.classList.remove('shake'),420);
    inp.value='';inp.focus();
  }
});

$('#logout').addEventListener('click',()=>{sessionStorage.removeItem(SESSION_KEY);location.reload();});

// mapea un lead de Notion (/api/leads-list) al shape que usa el panel
function mapNotionLead(n,i){
  const e=(n.estado||'Nuevo').toLowerCase();
  const estado=e.startsWith('contact')?'contactado':e.startsWith('cita')?'cita':e.startsWith('cerrad')?'cerrado':'nuevo';
  const m=(n.musica||'').toLowerCase();
  const musica=m==='dj'?'dj':(m==='vivo'||m==='grupo')?'grupo':'sin';
  return {
    id:n.id||('N'+i),
    nombre:n.nombre||n.nombresFestejado||'Sin nombre',
    tipo:'social',
    personas:n.personas||0,
    fecha:n.fechaEvento||'',
    hora:(n.hora||'noche').toLowerCase(),
    musica,
    total:n.total||0,
    tel:n.telefono||'',
    email:n.email||'',
    estado,
    creado:n.fechaCaptura||'',
    notas:''
  };
}

function openApp(){
  $('#app').classList.add('on');
  const arranca=()=>goto(location.hash.replace('#','')||'dashboard');
  // leer leads reales de Notion; si falla (sin API / sin red), usar datos demo
  fetch('/api/leads-list')
    .then(r=>{if(!r.ok)throw new Error('http');return r.json();})
    .then(data=>{
      if(!Array.isArray(data))throw new Error('shape');
      LEADS=data.map(mapNotionLead); saveData(); arranca();
    })
    .catch(()=>{loadData(); arranca();});
}

/* ════════════════════ ROUTING ════════════════════ */
const TITLES={dashboard:'Dashboard',leads:'Leads',calendario:'Calendario',estadisticas:'Estadísticas',config:'Configuración'};
function goto(route){
  if(!TITLES[route])route='dashboard';
  location.hash=route;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.route===route));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
  $('#sec-'+route).classList.add('show');
  $('#tbTitle').textContent=TITLES[route];
  render(route);
}
document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>goto(n.dataset.route)));
window.addEventListener('hashchange',()=>{const r=location.hash.replace('#','');if(TITLES[r])goto(r);});

function render(route){
  if(route==='dashboard')renderDashboard();
  else if(route==='leads')renderLeads();
  else if(route==='calendario')renderCalendario();
  else if(route==='estadisticas')renderEstadisticas();
  else if(route==='config')renderConfig();
}

/* ════════════════════ DASHBOARD ════════════════════ */
function renderDashboard(){
  const total=LEADS.length;
  const semana=LEADS.filter(l=>HOY-new Date(l.creado)<7*864e5).length;
  const semanaPrev=LEADS.filter(l=>{const d=HOY-new Date(l.creado);return d>=7*864e5&&d<14*864e5}).length;
  const citas=LEADS.filter(l=>l.estado==='cita'||l.estado==='cerrado').length;
  const prom=Math.round(LEADS.reduce((a,l)=>a+l.total,0)/(total||1));
  const trend=semana-semanaPrev;

  // chart: leads por mes (últimos 6 meses por fecha de creación)
  const buckets=[];
  for(let i=5;i>=0;i--){const d=new Date(HOY.getFullYear(),HOY.getMonth()-i,1);buckets.push({y:d.getFullYear(),m:d.getMonth(),c:0});}
  LEADS.forEach(l=>{const d=new Date(l.creado);const b=buckets.find(x=>x.y===d.getFullYear()&&x.m===d.getMonth());if(b)b.c++;});
  const maxC=Math.max(...buckets.map(b=>b.c),1);

  const recientes=[...LEADS].sort((a,b)=>new Date(b.creado)-new Date(a.creado)).slice(0,5);

  $('#sec-dashboard').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kl">Leads totales</div><div class="kv">${total}</div>
        <div class="ktrend"><span class="${trend>=0?'up':'dn'}">${trend>=0?'↑':'↓'} ${Math.abs(trend)}</span> vs. semana pasada</div>
      </div>
      <div class="kpi">
        <div class="kl">Esta semana</div><div class="kv">${semana}</div>
        <div class="ktrend">nuevos en 7 días</div>
      </div>
      <div class="kpi accent-green">
        <div class="kl">Citas agendadas</div><div class="kv">${citas}</div>
        <div class="ktrend">en pipeline activo</div>
      </div>
      <div class="kpi accent-gold">
        <div class="kl">Inversión promedio</div><div class="kv">${peso(prom)}</div>
        <div class="ktrend">por evento estimado</div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="panel chart">
        <div class="row-head"><div><div class="eyebrow">Captación</div><div class="block-title">Leads por mes</div></div></div>
        <div class="bars">
          ${buckets.map(b=>`<div class="bar-col">
            <div class="bar" style="height:${Math.round(b.c/maxC*100)}%"><span class="bval">${b.c}</span></div>
            <div class="bar-lbl">${MESES[b.m]}</div></div>`).join('')}
        </div>
      </div>
      <div class="panel chart">
        <div class="row-head"><div><div class="eyebrow">Actividad</div><div class="block-title">Últimos leads</div></div>
          <a class="link-gold" data-link="leads">Ver todos →</a></div>
        <div class="tbl-wrap"><table class="tbl"><tbody>
          ${recientes.map(l=>`<tr data-id="${l.id}">
            <td><div class="td-name">${l.nombre}</div><div class="td-sub">${TIPOS[l.tipo].label} · ${l.personas} pers.</div></td>
            <td class="tot">${peso(l.total)}</td>
            <td>${estadoBadge(l.estado)}</td>

      <div class="row-head"><div><div class="eyebrow">Pipeline</div><div class="block-title">Embudo de ventas — arrastra para mover</div></div></div>
      <div class="kanban" id="kanban">
        ${Object.keys(ESTADOS).map(est=>{
          const items=LEADS.filter(l=>l.estado===est);
          return `<div class="kcol" data-estado="${est}">
            <div class="kcol-head"><span class="kt">${ESTADOS[est].label}</span><span class="kc">${items.length}</span></div>
            <div class="kcol-body">
              ${items.length?items.map(l=>`<div class="kcard" draggable="true" data-id="${l.id}">
                  <div class="kn">${l.nombre}</div>
                  <div class="kmeta"><span class="ke">${TIPOS[l.tipo].em} ${TIPOS[l.tipo].label}</span><span class="kp">${peso(l.total)}</span></div>
                </div>`).join(''):'<div class="kempty">Sin leads</div>'}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  // row click → drawer
  $('#sec-dashboard').querySelectorAll('tr[data-id]').forEach(r=>r.addEventListener('click',()=>openDrawer(r.dataset.id)));
  $('#sec-dashboard').querySelector('[data-link="leads"]').addEventListener('click',()=>goto('leads'));
  initKanban();
}

function initKanban(){
  let dragId=null;
  document.querySelectorAll('.kcard').forEach(c=>{
    c.addEventListener('click',e=>{if(!c.classList.contains('dragging'))openDrawer(c.dataset.id)});
    c.addEventListener('dragstart',e=>{dragId=c.dataset.id;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    c.addEventListener('dragend',()=>{c.classList.remove('dragging');dragId=null;});
  });
  document.querySelectorAll('.kcol').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      if(!dragId)return;
      const l=LEADS.find(x=>x.id===dragId);
      if(l&&l.estado!==col.dataset.estado){
        l.estado=col.dataset.estado;saveData();
        toast(`${l.nombre} → ${ESTADOS[l.estado].label}`);
        renderDashboard();
      }
    });
  });
}

/* ════════════════════ LEADS ════════════════════ */
let leadFilters={estado:'todos',tipo:'todos',mes:'todos',musica:'todos'};
let leadSort={col:'creado',dir:-1};

function leadMonths(){
  const set=new Set();LEADS.forEach(l=>{const d=new Date(l.fecha+'T12:00:00');set.add(d.getFullYear()+'-'+d.getMonth());});
  return[...set].sort();
}

function renderLeads(){
  const months=leadMonths();
  const filterBar=`
    <div class="filters panel" style="padding:18px 20px">
      <div class="filter-row"><span class="fl">Estado</span>
        ${['todos',...Object.keys(ESTADOS)].map(e=>`<button class="pill ${leadFilters.estado===e?'on gold':''}" data-f="estado" data-v="${e}">${e==='todos'?'Todos':ESTADOS[e].label}</button>`).join('')}
      </div>
      <div class="filter-row"><span class="fl">Tipo</span>
        ${['todos',...Object.keys(TIPOS)].map(t=>`<button class="pill ${leadFilters.tipo===t?'on':''}" data-f="tipo" data-v="${t}">${t==='todos'?'Todos':TIPOS[t].em+' '+TIPOS[t].label}</button>`).join('')}
      </div>
      <div class="filter-row"><span class="fl">Mes</span>
        <button class="pill ${leadFilters.mes==='todos'?'on':''}" data-f="mes" data-v="todos">Todos</button>
        ${months.map(m=>{const[y,mo]=m.split('-');return`<button class="pill ${leadFilters.mes===m?'on':''}" data-f="mes" data-v="${m}">${MESES[+mo]} ${y}</button>`}).join('')}
      </div>
      <div class="filter-row" style="margin-bottom:0"><span class="fl">Música</span>
        ${['todos',...Object.keys(MUSICA)].map(mu=>`<button class="pill ${leadFilters.musica===mu?'on':''}" data-f="musica" data-v="${mu}">${mu==='todos'?'Todas':MUSICA[mu]}</button>`).join('')}
      </div>
    </div>`;

  let rows=LEADS.filter(l=>{
    if(leadFilters.estado!=='todos'&&l.estado!==leadFilters.estado)return false;
    if(leadFilters.tipo!=='todos'&&l.tipo!==leadFilters.tipo)return false;
    if(leadFilters.musica!=='todos'&&l.musica!==leadFilters.musica)return false;
    if(leadFilters.mes!=='todos'){const d=new Date(l.fecha+'T12:00:00');if(d.getFullYear()+'-'+d.getMonth()!==leadFilters.mes)return false;}
    return true;
  });

  rows.sort((a,b)=>{
    let A,B;const c=leadSort.col;
    if(c==='fecha'||c==='creado'){A=new Date(a[c]);B=new Date(b[c]);}
    else if(c==='total'||c==='personas'){A=a[c];B=b[c];}
    else{A=String(a[c]).toLowerCase();B=String(b[c]).toLowerCase();}
    return(A<B?-1:A>B?1:0)*leadSort.dir;
  });

  const arrow=c=>leadSort.col===c?(leadSort.dir>0?'▲':'▼'):'↕';
  const sortedCls=c=>leadSort.col===c?'sorted':'';

  const table=`
    <div class="panel" style="margin-top:22px">
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr>
          <th class="sortable ${sortedCls('fecha')}" data-sort="fecha">Fecha evento <span class="arr">${arrow('fecha')}</span></th>
          <th class="sortable ${sortedCls('nombre')}" data-sort="nombre">Festejado <span class="arr">${arrow('nombre')}</span></th>
          <th>Evento</th>
          <th class="sortable ${sortedCls('personas')}" data-sort="personas">Per <span class="arr">${arrow('personas')}</span></th>
          <th>Hora</th><th>Música</th>
          <th class="sortable ${sortedCls('total')}" data-sort="total">Total <span class="arr">${arrow('total')}</span></th>
          <th>Estado</th><th>Acciones</th>
        </tr></thead>
        <tbody>
        ${rows.length?rows.map(l=>`<tr data-id="${l.id}">
          <td><div style="font:400 13px/1.2 var(--font-body);color:var(--text-mid)">${fechaCorta(l.fecha)}</div><div class="cell-mut">${new Date(l.fecha).getFullYear()}</div></td>
          <td><div class="td-name">${l.nombre}</div><div class="td-sub">${TIPOS[l.tipo].label}</div></td>
          <td>${tipoBadge(l.tipo)}</td>
          <td><span class="people"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${l.personas}</span></td>
          <td class="cell-mut">${HORAS[l.hora]}</td>
          <td class="cell-mut">${MUSICA[l.musica]}</td>
          <td class="tot">${peso(l.total)}</td>
          <td>${estadoBadge(l.estado)}</td>
          <td><div class="acts">
            <a class="act" href="tel:${l.tel}" title="Llamar" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></a>
            <a class="act wa" href="${waLink(l.tel)}" target="_blank" rel="noopener" title="WhatsApp" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg></a>
          </div></td>
        </tr>`).join(''):`<tr><td colspan="9"><div class="empty-state"><div class="es-t">Sin resultados</div><div class="es-s">Ajusta los filtros para ver más leads.</div></div></td></tr>`}
        </tbody>
      </table></div>
    </div>`;

  $('#sec-leads').innerHTML=`
    <div class="row-head"><div><div class="eyebrow">Cartera</div><div class="block-title">${rows.length} lead${rows.length!==1?'s':''} ${leadFilters.estado!=='todos'||leadFilters.tipo!=='todos'||leadFilters.mes!=='todos'||leadFilters.musica!=='todos'?'(filtrados)':''}</div></div></div>
    ${filterBar}${table}`;

  $('#sec-leads').querySelectorAll('.pill[data-f]').forEach(p=>p.addEventListener('click',()=>{leadFilters[p.dataset.f]=p.dataset.v;renderLeads();}));
  $('#sec-leads').querySelectorAll('th[data-sort]').forEach(th=>th.addEventListener('click',()=>{
    const c=th.dataset.sort;if(leadSort.col===c)leadSort.dir*=-1;else{leadSort.col=c;leadSort.dir=1;}renderLeads();
  }));
  $('#sec-leads').querySelectorAll('tr[data-id]').forEach(r=>r.addEventListener('click',()=>openDrawer(r.dataset.id)));
}

/* ════════════════════ CALENDARIO ════════════════════ */
let calY=HOY.getFullYear(),calM=HOY.getMonth();
function renderCalendario(){
  const first=new Date(calY,calM,1);const start=first.getDay();
  const days=new Date(calY,calM+1,0).getDate();
  const eventos={};
  LEADS.forEach(l=>{const d=new Date(l.fecha+'T12:00:00');if(d.getFullYear()===calY&&d.getMonth()===calM){(eventos[d.getDate()]=eventos[d.getDate()]||[]).push(l);}});

  let cells='';
  for(let i=0;i<start;i++)cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=days;d++){
    const isToday=(calY===HOY.getFullYear()&&calM===HOY.getMonth()&&d===HOY.getDate());
    const evs=eventos[d]||[];
    cells+=`<div class="cal-cell ${isToday?'today':''}">
      <div class="dnum">${d}</div>
      ${evs.map(l=>`<div class="cal-ev ${TIPOS[l.tipo].cal}" data-id="${l.id}" title="${l.nombre}">${TIPOS[l.tipo].em} ${l.nombre.split('&')[0].trim().split(' ')[0]}</div>`).join('')}
    </div>`;
  }

  const totalMes=LEADS.filter(l=>{const d=new Date(l.fecha+'T12:00:00');return d.getFullYear()===calY&&d.getMonth()===calM}).length;

  $('#sec-calendario').innerHTML=`
    <div class="cal-head">
      <div><div class="eyebrow">Agenda de eventos</div><div class="block-title">${totalMes} evento${totalMes!==1?'s':''} este mes</div></div>
      <div class="cal-nav">
        <button id="calPrev" aria-label="Mes anterior"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="cal-month">${MESES_L[calM]} ${calY}</div>
        <button id="calNext" aria-label="Mes siguiente"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
    <div class="panel" style="padding:20px">
      <div class="cal-grid">${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
      <div class="cal-grid" style="margin-top:8px">${cells}</div>
    </div>`;

  $('#calPrev').addEventListener('click',()=>{calM--;if(calM<0){calM=11;calY--;}renderCalendario();});
  $('#calNext').addEventListener('click',()=>{calM++;if(calM>11){calM=0;calY++;}renderCalendario();});
  $('#sec-calendario').querySelectorAll('.cal-ev[data-id]').forEach(e=>e.addEventListener('click',()=>openDrawer(e.dataset.id)));
}

/* ════════════════════ ESTADÍSTICAS ════════════════════ */
function renderEstadisticas(){
  const total=LEADS.length;
  // por tipo
  const porTipo=Object.keys(TIPOS).map(t=>({t,c:LEADS.filter(l=>l.tipo===t).length})).sort((a,b)=>b.c-a.c);
  const maxTipo=Math.max(...porTipo.map(x=>x.c),1);
  // funnel
  const fn=Object.keys(ESTADOS).map(e=>({e,c:LEADS.filter(l=>l.estado===e).length}));
  const fnColors={nuevo:'var(--gold)',contactado:'var(--blue)',cita:'var(--green)',cerrado:'var(--forest)'};
  const maxFn=Math.max(...fn.map(x=>x.c),1);
  // ingresos por tipo
  const ingTipo=Object.keys(TIPOS).map(t=>({t,v:LEADS.filter(l=>l.tipo===t).reduce((a,l)=>a+l.total,0)})).sort((a,b)=>b.v-a.v);
  const totalIng=ingTipo.reduce((a,x)=>a+x.v,0);
  const tipoColors={boda:'#8a6a3a',xv:'#7a4f86',comunion:'#5a7884',social:'var(--green)',corporativo:'#556'};
  // tasa cierre
  const cerrados=LEADS.filter(l=>l.estado==='cerrado').length;
  const tasa=total?Math.round(cerrados/total*100):0;
  const pipeline=LEADS.filter(l=>l.estado!=='cerrado').reduce((a,l)=>a+l.total,0);

  $('#sec-estadisticas').innerHTML=`
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi accent-green"><div class="kl">Tasa de cierre</div><div class="kv">${tasa}%</div><div class="ktrend">${cerrados} de ${total} leads</div></div>
      <div class="kpi accent-gold"><div class="kl">Valor en pipeline</div><div class="kv" style="font-size:38px">${peso(pipeline)}</div><div class="ktrend">eventos sin cerrar</div></div>
      <div class="kpi"><div class="kl">Ingreso potencial</div><div class="kv" style="font-size:38px">${peso(totalIng)}</div><div class="ktrend">cartera completa</div></div>
    </div>
    <div class="stat-grid">
      <div class="panel chart">
        <div class="eyebrow">Distribución</div><div class="block-title" style="margin-bottom:6px">Leads por tipo de evento</div>
        ${porTipo.map(x=>`<div class="hbar-row">
          <div class="hbar-lbl">${TIPOS[x.t].em} ${TIPOS[x.t].label}</div>
          <div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(x.c/maxTipo*100,6)}%;background:${tipoColors[x.t]}">${x.c}</div></div>
        </div>`).join('')}
      </div>
      <div class="panel chart">
        <div class="eyebrow">Conversión</div><div class="block-title">Embudo de ventas</div>
        <div class="funnel">
          ${fn.map(x=>`<div class="fn-row">
            <div class="fn-bar" style="width:${Math.max(x.c/maxFn*100,18)}%;background:${fnColors[x.e]}"><span class="fc">${x.c}</span>${ESTADOS[x.e].label}</div>
            <span class="fn-pct">${total?Math.round(x.c/total*100):0}%</span>
          </div>`).join('')}
        </div>
      </div>
      <div class="panel chart">
        <div class="eyebrow">Ingresos</div><div class="block-title" style="margin-bottom:6px">Valor estimado por tipo</div>
        <div class="legend" style="margin-top:16px">
          ${ingTipo.map(x=>`<div class="lg-item"><span class="lg-dot" style="background:${tipoColors[x.t]}"></span>${TIPOS[x.t].label}<span class="lg-v">${peso(x.v)}</span></div>`).join('')}
        </div>
        <div class="hbar-track" style="height:14px;margin-top:20px;display:flex">
          ${ingTipo.filter(x=>x.v>0).map(x=>`<div style="width:${x.v/totalIng*100}%;height:100%;background:${tipoColors[x.t]}" title="${TIPOS[x.t].label}"></div>`).join('')}
        </div>
      </div>
      <div class="panel chart">
        <div class="eyebrow">Origen</div><div class="block-title" style="margin-bottom:6px">Música solicitada</div>
        ${Object.keys(MUSICA).map(mu=>{const c=LEADS.filter(l=>l.musica===mu).length;const mx=Math.max(...Object.keys(MUSICA).map(m=>LEADS.filter(l=>l.musica===m).length),1);
          return`<div class="hbar-row"><div class="hbar-lbl">${MUSICA[mu]}</div><div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(c/mx*100,6)}%;background:var(--gold)">${c}</div></div></div>`}).join('')}
      </div>
    </div>`;
}

      <div class="dr-actions">
        <a class="dr-call" href="tel:${l.tel}"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Llamar</a>
        <a class="dr-wa" href="${waLink(l.tel)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg>WhatsApp</a>
      </div>
    </div>`;

  $('#drClose').addEventListener('click',closeDrawer);
  $('#drStates').querySelectorAll('[data-est]').forEach(b=>b.addEventListener('click',()=>{
    l.estado=b.dataset.est;saveData();
    $('#drStates').querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p===b)&&p.classList.toggle('gold',p===b));
    $('#drStates').querySelectorAll('.pill').forEach(p=>{const on=p.dataset.est===l.estado;p.classList.toggle('on',on);p.classList.toggle('gold',on);});
    toast(`Estado → ${ESTADOS[l.estado].label}`);
    render(location.hash.replace('#','')||'dashboard');
  }));

  $('#drawer').classList.add('open');$('#drawerBack').classList.add('open');
}
function closeDrawer(){$('#drawer').classList.remove('open');$('#drawerBack').classList.remove('open');}
$('#drawerBack').addEventListener('click',closeDrawer);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

/* ════════════════════ BÚSQUEDA GLOBAL ════════════════════ */
$('#globalSearch').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q)return;
  goto('leads');
  // resaltar resultados filtrando la tabla en vivo
  setTimeout(()=>{
    document.querySelectorAll('#sec-leads tr[data-id]').forEach(r=>{
      const l=LEADS.find(x=>x.id===r.dataset.id);
      const hay=(l.nombre+' '+l.tel+' '+l.fecha+' '+fechaCorta(l.fecha)+' '+TIPOS[l.tipo].label).toLowerCase();
      r.style.display=hay.includes(q)?'':'none';
    });
  },60);
});

/* ════════════════════ ARRANQUE ════════════════════ */
if(sessionStorage.getItem(SESSION_KEY)){
  $('#login').style.display='none';openApp();
}else{
  setTimeout(()=>$('#pinInput').focus(),300);
}
</script>
</body>
</html>
