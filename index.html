<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Asesoría Virtual · El Romeral</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--gold:#B8935A;--forest:#1A2F23;--forest-deep:#0D1A12;--ivory:#F5F1EB;--text:#2A2A2A;--spring:cubic-bezier(0.34,1.56,0.64,1);--ease:cubic-bezier(0.22,1,0.36,1)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Lato',sans-serif;font-weight:300;font-size:15px;line-height:1.6;color:var(--text);background:var(--ivory);-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,.serif{font-family:'DM Serif Display',serif;font-weight:400;line-height:1.12}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.btn-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:10px 0;transition:opacity .3s;opacity:.7}
.btn-back:hover{opacity:1}
.btn-back-hero{color:rgba(245,241,235,0.7);position:absolute;top:max(18px,env(safe-area-inset-top));left:18px;z-index:10}
.btn-back-hero:hover{color:var(--ivory)}
.btn-back-steps{color:var(--forest);margin-bottom:8px}
.back-row{display:flex;align-items:center;margin-bottom:4px}
.phase{display:none;min-height:100vh;width:100%}
.phase.active{display:flex}
#hero{position:relative;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ivory);padding:20px 20px 20px;min-height:100vh;min-height:100svh;background:#0D1A12}
#hero::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 38%,rgba(13,26,18,0.30) 0%,rgba(13,26,18,0.72) 100%),linear-gradient(to bottom,rgba(13,26,18,0.45),rgba(13,26,18,0.62) 55%,rgba(13,26,18,0.82))}
#hero>*{position:relative;z-index:2}
.hero-eyebrow{font-size:clamp(24px,3.8vw,42px);letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px}
#hero h1{font-size:clamp(13px,1.4vw,18px);max-width:30ch;margin-bottom:4px;letter-spacing:.04em;font-weight:300;opacity:.75;font-family:'Lato',sans-serif}
#hero h1 .gold{color:var(--gold)}
.hero-sub{font-size:12px;color:rgba(245,241,235,0.45);font-weight:300;max-width:36ch;margin:10px auto 0;letter-spacing:.01em}
.cta{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:var(--forest-deep);font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;padding:12px 30px;border-radius:2px;transition:transform .5s var(--spring),box-shadow .4s var(--ease),background .3s;box-shadow:0 10px 34px rgba(184,147,90,0.28);width:100%;justify-content:center}
.cta:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 16px 44px rgba(184,147,90,0.4)}
.cta:active{transform:translateY(0) scale(.99)}
.cta:disabled{background:#c9c1b4;color:#8a8478;box-shadow:none;cursor:not-allowed;transform:none}
.hero-cal{width:100%;display:flex;flex-direction:column;align-items:center;margin-top:8px;gap:0}
.cal-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,241,235,0.5);font-weight:700;margin-bottom:8px}
.hero-cal .step-cta{margin-top:10px;width:100%;max-width:420px}
#steps{background:var(--ivory);flex-direction:column;align-items:center;justify-content:center;padding:48px 20px}
.steps-inner{width:100%;max-width:760px;text-align:center}
.dots{display:flex;gap:12px;justify-content:center;margin-bottom:36px}
.dot{width:11px;height:11px;border-radius:50%;background:#d8d0c2;transition:background .4s var(--spring),transform .5s var(--spring)}
.dot.on{background:var(--gold);transform:scale(1.18)}
.step{display:none}
.step.active{display:block;animation:fadeUp .7s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.step h2{font-size:clamp(26px,5vw,48px);color:var(--forest);margin-bottom:8px}
.step .lead{color:#6b6457;font-size:15px;margin-bottom:28px}
.step-cta{margin-top:32px}
.cal{width:100%;max-width:800px;margin:0 auto;background:rgba(26,47,35,0.45);border:1px solid rgba(245,241,235,0.14);border-radius:16px;padding:16px 24px 18px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--ivory)}
.cal-years-row{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.cal-ytab{padding:5px 16px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.04em;color:rgba(245,241,235,0.6);border:1px solid rgba(245,241,235,0.18);transition:all .3s;cursor:pointer;background:none}
.cal-ytab:hover{color:var(--ivory);border-color:rgba(245,241,235,0.4)}
.cal-ytab.on{background:var(--gold);border-color:var(--gold);color:var(--forest-deep)}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav-btn{background:none;border:none;cursor:pointer;color:rgba(245,241,235,0.7);font-size:22px;padding:4px 10px;transition:color .2s;line-height:1;font-family:inherit}
.cal-nav-btn:hover{color:var(--gold)}
.cal-nav-btn:disabled{color:rgba(245,241,235,0.2);cursor:not-allowed}
.cal-month-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--ivory);letter-spacing:.01em;text-align:center;flex:1}
.cal-days{width:100%}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:0;margin-bottom:4px}
.cal-dow{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:rgba(245,241,235,0.45);text-align:center;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;row-gap:2px}
.cal-day{height:44px;width:44px;display:flex;align-items:center;justify-content:center;font-size:15px;border-radius:50%;color:var(--ivory);transition:background .25s,color .25s,transform .4s var(--spring);margin:0 auto}
.cal-day.empty{visibility:hidden}
.cal-day.avail{cursor:pointer}
.cal-day.avail:hover{background:rgba(245,241,235,0.14)}
.cal-day.disabled{color:rgba(245,241,235,0.22);cursor:not-allowed}
.cal-day.sel{background:var(--gold);color:#fff;transform:scale(1.1);font-weight:700}
.reward{display:block;margin-top:8px;text-align:center;color:var(--gold);font-weight:700;font-size:13px;letter-spacing:.05em;opacity:0;transform:translateY(8px);transition:opacity .5s var(--ease),transform .5s var(--spring)}
.reward.show{opacity:1;transform:translateY(0)}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:640px;margin:0 auto}
.type-card{position:relative;background:#fff;border:1.5px solid #e7e0d3;border-radius:10px;padding:22px 12px;text-align:center;transition:transform .5s var(--spring),border-color .35s,background .35s,box-shadow .4s}
.type-card:hover{border-color:var(--gold);transform:scale(1.03);box-shadow:0 14px 34px rgba(26,47,35,0.08)}
.type-card.sel{border-color:var(--gold);background:rgba(184,147,90,0.1)}
.type-ico{font-size:26px;margin-bottom:8px}
.type-name{font-family:'DM Serif Display',serif;font-size:17px;color:var(--forest)}
.type-check{position:absolute;top:8px;right:10px;color:var(--gold);font-weight:700;opacity:0;transform:scale(.4);transition:all .45s var(--spring)}
.type-card.sel .type-check{opacity:1;transform:scale(1)}
.guest-num{font-family:'DM Serif Display',serif;font-size:clamp(60px,16vw,140px);color:var(--forest);line-height:1}
.guest-label{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#a39c8c;margin-bottom:24px}
.slider-wrap{max-width:460px;margin:0 auto}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;background:#ddd5c6;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 4px 14px rgba(184,147,90,0.5);transition:transform .3s var(--spring)}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.2)}
input[type=range]::-moz-range-thumb{width:26px;height:26px;border:none;border-radius:50%;background:var(--gold);cursor:pointer}
.slider-ends{display:flex;justify-content:space-between;font-size:12px;color:#a39c8c;margin-top:10px;letter-spacing:.06em}
@media(max-width:600px){
  #hero{min-height:100svh;justify-content:flex-start;padding:10px 14px 16px}
  .hero-eyebrow{font-size:clamp(20px,5.5vw,30px);letter-spacing:.22em;margin-bottom:4px;margin-top:max(36px,env(safe-area-inset-top))}
  #hero h1{font-size:clamp(12px,3.8vw,16px);max-width:32ch;letter-spacing:.03em;font-weight:300;opacity:.75;font-family:'Lato',sans-serif}
  .hero-sub{font-size:13px;margin:6px auto 10px}
  .cal{padding:10px 10px 12px;border-radius:14px}
  .cal-years-row{gap:6px;margin-bottom:8px}
  .cal-ytab{padding:5px 12px;font-size:12px}
  .cal-month-title{font-size:15px}
  .cal-nav-btn{font-size:20px;padding:4px 8px}
  .cal-dows{width:100%}
  .cal-grid{width:100%;gap:0;row-gap:3px}
  .cal-dow{font-size:11px}
  .cal-day{height:clamp(36px,11vw,48px);width:clamp(36px,11vw,48px);font-size:14px}
  .reward{font-size:13px;margin-top:10px}
  .hero-cal{margin-top:6px}
  .hero-cal .step-cta{margin-top:8px}
  .type-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .type-card{padding:18px 10px}
  #steps{padding:36px 16px}
  .dots{margin-bottom:28px}
}
@media(max-width:879px){.type-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<section id="hero" class="phase active">
  <p class="hero-eyebrow">El Romeral</p>
  <h1>No organizamos eventos.<br><span class="gold">Creamos momentos que perduran.</span></h1>
  <div class="hero-cal">
    <p class="cal-label">Selecciona la fecha de tu evento</p>
    <div class="cal" id="cal"></div>
    <span class="reward" id="dateReward"></span>
    <div class="step-cta"><button class="cta" id="cta1" disabled>Continuar &rarr;</button></div>
  </div>
</section>
<section id="steps" class="phase">
  <div class="steps-inner">
    <div class="dots"><span class="dot on"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="step active" data-step="2">
      <div class="back-row"><button class="btn-back btn-back-steps" id="back2">&larr; Fecha</button></div>
      <h2>¿Qué van a celebrar?</h2>
      <p class="lead">Cada celebración tiene su propia esencia.</p>
      <div class="type-grid" id="typeGrid">
        <button class="type-card" data-tipo="boda"><div class="type-ico">💍</div><div class="type-name">Boda</div><span class="type-check">✓</span></button>
        <button class="type-card" data-tipo="xv"><div class="type-ico">👑</div><div class="type-name">XV Años</div><span class="type-check">✓</span></button>
        <button class="type-card" data-tipo="corporativo"><div class="type-ico">🏛️</div><div class="type-name">Corporativo</div><span class="type-check">✓</span></button>
        <button class="type-card" data-tipo="social"><div class="type-ico">🥂</div><div class="type-name">Social</div><span class="type-check">✓</span></button>
        <button class="type-card" data-tipo="bautizo"><div class="type-ico">🕊️</div><div class="type-name">Bautizo</div><span class="type-check">✓</span></button>
        <button class="type-card" data-tipo="comunion"><div class="type-ico">✝️</div><div class="type-name">1ra Comunión</div><span class="type-check">✓</span></button>
      </div>
      <div class="step-cta"><button class="cta" id="cta2" disabled>Continuar &rarr;</button></div>
    </div>
    <div class="step" data-step="3">
      <div class="back-row"><button class="btn-back btn-back-steps" id="back3">&larr; Tipo de evento</button></div>
      <h2>¿Cuántos invitados esperan?</h2>
      <p class="lead">Desliza para ajustar el número de invitados.</p>
      <div class="guest-num" id="guestNum">120</div>
      <div class="guest-label">Invitados</div>
      <div class="slider-wrap">
        <input type="range" id="guestSlider" min="50" max="400" step="10" value="120">
        <div class="slider-ends"><span>50</span><span>400</span></div>
      </div>
      <div class="step-cta"><button class="cta" id="cta3">Ver mi experiencia &rarr;</button></div>
    </div>
  </div>
</section>
<script>
const BLOCKED=['2026-01-31','2026-03-14','2026-04-11','2026-04-25','2026-05-02','2026-10-10','2026-11-14','2027-07-10'];
const S={fecha:null,tipo:null,personas:120};
function goPhase(id){document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'instant'})}
const dots=document.querySelectorAll('.dot');
function showStep(n){document.querySelectorAll('.step').forEach(s=>s.classList.toggle('active',+s.dataset.step===n));dots.forEach((d,i)=>d.classList.toggle('on',i<n))}
const DOW=['D','L','M','M','J','V','S'];
const today=new Date();today.setHours(0,0,0,0);
let viewY=today.getFullYear(),viewM=today.getMonth();
const calEl=document.getElementById('cal');
function pad(n){return String(n).padStart(2,'0')}
function clampMonth(){if(viewY===today.getFullYear()&&viewM<today.getMonth())viewM=today.getMonth()}
const MONTHS_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function renderCal(){
  const first=new Date(viewY,viewM,1).getDay();
  const days=new Date(viewY,viewM+1,0).getDate();
  const dows=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  let grid=`<div class="cal-dows">${dows}</div><div class="cal-grid">`;
  for(let i=0;i<first;i++)grid+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const iso=`${viewY}-${pad(viewM+1)}-${pad(d)}`;
    const dateObj=new Date(viewY,viewM,d);
    const past=dateObj<today;
    const blocked=BLOCKED.includes(iso);
    const sel=S.fecha===iso;
    grid+=`<div class="cal-day ${past?'disabled':blocked?'blocked avail':'avail'} ${sel?'sel':''}" data-iso="${iso}" ${past?'':'data-pick="1"'}>${d}</div>`;
  }
  grid+=`</div>`;
  const yearNow=today.getFullYear();
  const minY=yearNow,maxY=yearNow+2;
  const isPrevDisabled=(viewY===minY&&viewM<=today.getMonth());
  const isNextDisabled=(viewY===maxY&&viewM===11);
  const yearTabs=[minY,minY+1,minY+2].map(y=>`<button class="cal-ytab ${y===viewY?'on':''}" data-y="${y}">${y}</button>`).join('');
  calEl.innerHTML=`<div class="cal-years-row">${yearTabs}</div><div class="cal-nav-row"><button class="cal-nav-btn" id="calPrev" ${isPrevDisabled?'disabled':''}>&#8249;</button><div class="cal-month-title">${MONTHS_FULL[viewM]}</div><button class="cal-nav-btn" id="calNext" ${isNextDisabled?'disabled':''}>&#8250;</button></div><div class="cal-days">${grid}</div>`;
  calEl.querySelectorAll('.cal-ytab').forEach(b=>{b.onclick=()=>{viewY=+b.dataset.y;clampMonth();renderCal();}});
  document.getElementById('calPrev').onclick=()=>{if(!isPrevDisabled){viewM--;if(viewM<0){viewM=11;viewY--;}clampMonth();renderCal();}};
  document.getElementById('calNext').onclick=()=>{if(!isNextDisabled){viewM++;if(viewM>11){viewM=0;viewY++;}renderCal();}};
  calEl.querySelectorAll('[data-pick]').forEach(c=>{c.onclick=()=>pickDate(c.dataset.iso)});
}
function pickDate(iso){
  const reward=document.getElementById('dateReward');
  const cta=document.getElementById('cta1');
  if(BLOCKED.includes(iso)){S.fecha='';reward.textContent='Esa fecha ya está reservada. Te sugerimos otra fecha cercana.';reward.style.color='rgba(245,100,100,0.9)';reward.classList.add('show');cta.disabled=true}
  else{S.fecha=iso;reward.textContent='¡Esa fecha está disponible!';reward.style.color='var(--gold)';reward.classList.add('show');cta.disabled=false}
  renderCal();
}
renderCal();
document.getElementById('cta1').onclick=()=>{goPhase('steps');showStep(2)};
document.getElementById('back2').onclick=()=>{goPhase('hero')};
document.getElementById('back3').onclick=()=>showStep(2);
document.querySelectorAll('.type-card').forEach(card=>{
  card.onclick=()=>{document.querySelectorAll('.type-card').forEach(c=>c.classList.remove('sel'));card.classList.add('sel');S.tipo=card.dataset.tipo;document.getElementById('cta2').disabled=false}
});
document.getElementById('cta2').onclick=()=>showStep(3);
const slider=document.getElementById('guestSlider');
const guestNum=document.getElementById('guestNum');
let guestObj={v:120};
function updateGuests(val){S.personas=val;gsap.to(guestObj,{v:val,duration:.5,ease:'power2.out',onUpdate:()=>{guestNum.textContent=Math.round(guestObj.v)}})}
slider.oninput=()=>updateGuests(+slider.value);
updateGuests(120);
document.getElementById('cta3').onclick=()=>{sessionStorage.setItem('romeral',JSON.stringify({fecha:S.fecha,tipo:S.tipo,personas:S.personas}));window.location.href='brochure.html'};
</script>
</body>
</html>
